apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: complex_etl
  namespace: default
spec:
  entrypoint: complex_etl
  templates:
  - name: complex_etl
    dag:
      tasks:
      - name: extract
        template: extract
      - name: transform
        template: transform
        dependencies: [extract]
      - name: load
        template: load
        dependencies: [transform]
  - name: extract
    container:
      image: python:3.11
      command: ["python", "extract.py"]
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
    retryStrategy:
      limit: 2
  - name: transform
    container:
      image: python:3.11
      command: ["python", "transform.py"]
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
  - name: load
    container:
      image: python:3.11
      command: ["python", "load.py"]
      resources:
        requests:
          memory: "512Mi"
          cpu: "100m"
